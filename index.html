<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>15K Celebration 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    overflow: hidden;
}

/* INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    z-index: 10;
    animation: fadeOut 3s forwards 3s;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* SLIDES */
.slide {
    width: 100%;
    min-height: 100vh;
    padding: 20px;
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    color: white;
    animation: fadeSlide 0.7s ease;
}

.active { display: flex; }

@keyframes fadeSlide {
    from { opacity: 0; transform: translateX(50px); }
    to { opacity: 1; transform: translateX(0); }
}

/* PROFILE */
.profile {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid white;
    box-shadow: 0 0 25px #ff4da6;
}

/* NAME */
.name {
    font-size: 26px;
    color: #ff4da6;
    margin-top: 10px;
}

/* BOX */
.box {
    margin: 5px;
    padding: 6px 10px;
    background: rgba(0,0,0,0.5);
    border-radius: 8px;
    opacity: 0;
    animation: show 0.5s forwards;
}

@keyframes show {
    to { opacity: 1; transform: translateY(0); }
}

/* GLOW */
.highlight {
    color: gold;
    animation: glow 1.5s infinite;
}

@keyframes glow {
    0% { box-shadow: 0 0 5px gold; }
    50% { box-shadow: 0 0 25px gold; }
    100% { box-shadow: 0 0 5px gold; }
}

/* ABOUT BG */
.about-bg {
    background: url("about-bg.jpg") center/cover;
}

/* TYPEWRITER */
.typewriter {
    width: 80%;
    max-width: 400px;
    color: #3b2f2f;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    line-height: 1.5;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
    backdrop-filter: blur(3px);
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 10px;
    border-radius: 20px;
    border: none;
    background: #ff4da6;
    color: white;
}

/* MUSIC BUTTON */
.music-btn {
    position: fixed;
    bottom: 15px;
    right: 15px;
    background: #ff4da6;
    padding: 10px;
    border-radius: 50%;
}

/* MOBILE */
@media (max-width:768px){
    body { overflow:auto; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">A small girl with big dreams… 💫</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="playMusic()">🎵</button>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">

<img src="photo.jpeg" class="profile">
<div class="name">Dristi 💖</div>

<div class="box">Jan 2026 — Account Created</div>
<div class="box">14 Jan — 500 Followers</div>
<div class="box">15 Jan — 1K Followers</div>
<div class="box">26 Jan — 4K Followers</div>
<div class="box">11 Feb — 6K Followers</div>
<div class="box">22 Feb — 8K Followers</div>
<div class="box">12 Mar — 10K Followers</div>

<div class="box highlight" onclick="celebrate()">
21 March 2026 — 15K 👑
</div>

<button onclick="nextSlide()">Next ➡️</button>

</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide about-bg">

<div class="typewriter" id="text"></div>

<button onclick="goBack()">⬅ Back</button>

</div>

<script>
const text = `She comes from the heart of heaven Nepal 🇳🇵
Ra usko naam ho Dristi.
She follows her dream of becoming a doctor.
Golden heart and calm soul.
And maybe… this is just the beginning 💫`;

let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 25);
    }
}

function nextSlide(){
    document.getElementById("slide1").classList.remove("active");
    document.getElementById("slide2").classList.add("active");
    setTimeout(typeWriter, 300);
}

function goBack(){
    location.reload();
}

function celebrate(){
    confetti({
        particleCount:200,
        spread:120
    });
}

function playMusic(){
    document.getElementById("bgMusic").play();
}
</script>

</body>
</html>
