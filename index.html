
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>15K Celebration 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    overflow: hidden;
}

/* PARTICLES */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    animation: fadeOut 3s forwards 3s;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* SLIDES */
.slide {
    width: 100%;
    height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    animation: slideIn 0.8s ease;
}

.active { display: flex; }

@keyframes slideIn {
    from { opacity: 0; transform: scale(1.1); }
    to { opacity: 1; transform: scale(1); }
}

/* PROFILE */
.profile {
    width: 150px;
    border-radius: 50%;
    box-shadow: 0 0 30px #ff4da6;
}

/* NAME */
.name {
    font-size: 28px;
    color: #ff4da6;
    margin: 10px;
}

/* JOURNEY */
.box {
    margin: 4px;
    padding: 8px;
    background: rgba(0,0,0,0.6);
    border-radius: 10px;
    backdrop-filter: blur(5px);
}

/* 15K */
.highlight {
    color: gold;
    animation: glow 1.5s infinite;
}

@keyframes glow {
    0% { box-shadow: 0 0 5px gold; }
    50% { box-shadow: 0 0 30px gold; }
    100% { box-shadow: 0 0 5px gold; }
}

/* TYPEWRITER */
.typewriter {
    width: 80%;
    max-width: 450px;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(5px);
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 30px;
    border: none;
    background: #ff4da6;
    color: white;
}

/* MUSIC */
.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

/* MOBILE */
@media (max-width:768px){
    body { overflow:auto; }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="intro">A story you’ll never forget… 💫</div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="playMusic()">🎵</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">

<img src="photo.jpeg" class="profile">
<div class="name">Dristi 💖</div>

<div class="box">Jan 2026 — Account Created</div>
<div class="box">14 Jan — 500 Followers</div>
<div class="box">15 Jan — 1K Followers</div>
<div class="box">26 Jan — 4K Followers</div>
<div class="box">11 Feb — 6K Followers</div>
<div class="box">22 Feb — 8K Followers</div>
<div class="box">12 Mar — 10K Followers</div>

<div class="box highlight" onclick="celebrate()">21 March 2026 — 15K 👑</div>

<button onclick="nextSlide()">Next ➡️</button>

</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">

<div class="typewriter" id="text"></div>

<button onclick="goBack()">⬅ Back</button>

</div>

<script>
// TYPEWRITER
const text = `She comes from the heart of heaven Nepal 🇳🇵
Ra usko naam ho Dristi.
She follows her dream of becoming a doctor.
Golden heart and calm soul.
And maybe… this is just the beginning 💫`;

let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 20);
    }
}

// NAV
function nextSlide(){
    document.getElementById("slide1").classList.remove("active");
    document.getElementById("slide2").classList.add("active");
    setTimeout(typeWriter, 500);
}

function goBack(){
    location.reload();
}

// CONFETTI
function celebrate(){
    confetti({
        particleCount: 200,
        spread: 120
    });
}

// MUSIC
function playMusic(){
    document.getElementById("bgMusic").play();
}

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<50;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*1
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,255,255,0.5)";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
    });
    update();
}

function update(){
    particles.forEach(p=>{
        p.y+=p.d;
        if(p.y>canvas.height) p.y=0;
    });
}

setInterval(draw,33);
</script>

</body>
</html>
