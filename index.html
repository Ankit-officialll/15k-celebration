<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>15K Celebration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    overflow: hidden;
}

/* PARTICLES */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* SLIDES */
.slide {
    width: 100%;
    height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
}

.active { display: flex; }

/* PROFILE */
.profile {
    width: 150px;
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(255,77,166,0.6);
}

/* NAME */
.name {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #ff4da6, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-top: 12px;
}

/* CONGRATS */
.congrats-text{
    font-size: 20px;
    margin-top: 20px;
    opacity: 0;
    text-align: center;
}

/* JOURNEY */
.journey {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.hidden{
    opacity: 0;
}

/* BOX ANIMATION */
.box {
    padding: 10px 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 13px;

    opacity: 0;
    transform: translateY(20px);
}

.box.show {
    opacity: 1;
    transform: translateY(0);
    transition: all 0.8s ease;
}

/* 15K */
.highlight {
    color: gold;
    font-weight: bold;
    border: 1px solid gold;
    box-shadow: 0 0 25px gold;
}

/* ABOUT TITLE */
.about-title{
    font-size: 26px;
    font-family: 'Playfair Display', serif;
    margin-bottom: 15px;

    background: linear-gradient(90deg, #ffd700, #ff4da6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* TYPEWRITER */
.typewriter {
    width: 85%;
    max-width: 450px;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    background: rgba(255,255,255,0.08);
    padding: 22px;
    border-radius: 16px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    white-space: pre-line;
}

/* BUTTON */
button {
    margin-top: 25px;
    padding: 10px 22px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg,#ff4da6,#ff1a75);
    color: white;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">

<img src="photo.jpeg" class="profile">
<div class="name">Dristi</div>

<div id="congrats" class="congrats-text">
    Congratulations for reaching <br> 15K followers 🎉
</div>

<div id="journey" class="journey hidden">
<div class="box">Jan 2026 — Account Created</div>
<div class="box">14 Jan 2026 — 500 Followers</div>
<div class="box">15 Jan 2026 — 1K Followers</div>
<div class="box">26 Jan 2026 — 4K Followers</div>
<div class="box">11 Feb 2026 — 6K Followers</div>
<div class="box">22 Feb 2026 — 8K Followers</div>
<div class="box">12 March 2026 — 10K Followers</div>
<div class="box highlight">23 March 2026 — 15K Followers 👑</div>
</div>

<button onclick="nextSlide()">Next ➡️</button>

</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">

<div class="about-title">About Her</div>

<div class="typewriter" id="text"></div>

<button onclick="goBack()">⬅ Back</button>

</div>

<script>
// TEXT
const text = `She comes from the heart of heaven Nepal 🇳🇵
Ra usko naam ho Dristi.
Ek aisi girl jo bachpan dekhi nai sapana dekhthyo… sirf 5 barsa ko umar ma usle decide garyo ki she wants to become a doctor, ra tespachi dekhi woh afno dream lai quietly, full dedication sanga follow gardai cha.
Woh sirf kind matra hoina, usko heart sachai golden cha yesto mann jo sabko care garcha, even jab koi notice pani gardaina.
Kabhi-kabhi usko efforts words ma express hudaina, tara clearly feel huncha.
Har topper ko pani weakness huncha, ra usko lagi tyo ho math 😄
But chemistry sanga usko connection ali different cha.
Usko voice loud hoina, ek calm feeling jasto ho jasko sunera mann halka huncha.
Ra usko sapana guitar sikne pani cha.
Yo simple, innocent soul “Sleeping Queen” ko naam le pani chincha jo kahile-kahi sano kura ma tension lincha, tara tyo nai uslai ajhai real ra human banauncha.
Usko life ma ek loving brother ra adorable pookie parents pani chan jasko presence le usko world complete jasto lagcha.
Ra sachai… she is not just someone you meet in life she is someone who stays in your memory ra ek choti basyo vane sajilai kahile pani birsina sakinna.`;

let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 18);
    }
}

function nextSlide(){
    document.getElementById("slide1").classList.remove("active");
    document.getElementById("slide2").classList.add("active");
    setTimeout(typeWriter, 400);
}

function goBack(){
    location.reload();
}

// FLOW + STAGGERED BOXES
window.onload = function(){

    // show congrats
    setTimeout(()=>{
        document.getElementById("congrats").style.opacity = 1;
    },1800);

    // show journey step by step
    setTimeout(()=>{
        document.getElementById("journey").classList.remove("hidden");

        const boxes = document.querySelectorAll(".box");

        boxes.forEach((box, index) => {
            setTimeout(() => {
                box.classList.add("show");

                if(index === boxes.length - 1){
                    confetti({
                        particleCount:200,
                        spread:120
                    });
                }

            }, index * 1000);
        });

    },3500);
};

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<60;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*0.8
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,255,255,0.4)";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
    });
    particles.forEach(p=>{
        p.y+=p.d;
        if(p.y>canvas.height) p.y=0;
    });
}

setInterval(draw,33);
</script>

</body>
</html>
